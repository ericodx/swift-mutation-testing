name: Main Analysis

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'

jobs:
  # Tests And Coverage
  test-and-coverage:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Swift version
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-${{ runner.arch }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Prepare directories
        run: |
          mkdir -p coverage

      - name: Run tests and generate coverage
        run: |
          set -e

          echo "Running tests with coverage..."
          swift test --enable-code-coverage --no-parallel --quiet

          BIN_PATH=$(swift build --show-bin-path)

          TEST_BINARY=$(find "$BIN_PATH" -type f \
            -path "*Tests.xctest/Contents/MacOS/*" \
            ! -path "*.dSYM/*" \
            | head -n 1)

          if [ -z "$TEST_BINARY" ]; then
            echo "Test binary not found"
            exit 1
          fi

          PROFDATA="$BIN_PATH/codecov/default.profdata"

          echo "Generating LCOV..."

          xcrun llvm-cov export \
            "$TEST_BINARY" \
            -instr-profile "$PROFDATA" \
            --sources "$(pwd)/Sources" \
            --format=lcov \
          | sed "s|$(pwd)/||g" \
          > coverage/lcov.info

          echo "Converting LCOV → Sonar Generic XML..."

          echo '<coverage version="1">' > coverage/code-coverage-report.xml

          awk '
            /^SF:/ {
              file = substr($0,4);
              if (file ~ /^Sources\/.*\.swift$/) {
                current_file = file;
                printf "  <file path=\"%s\">\n", current_file;
                inside = 1;
              } else {
                inside = 0;
              }
            }

            inside && /^DA:/ {
              split($0,a,",");
              line = substr(a[1],4);
              covered = (a[2] > 0 ? "true" : "false");
              printf "    <lineToCover lineNumber=\"%s\" covered=\"%s\"/>\n", line, covered;
            }

            inside && /^end_of_record/ {
              print "  </file>";
            }
          ' coverage/lcov.info >> coverage/code-coverage-report.xml

          echo '</coverage>' >> coverage/code-coverage-report.xml

          echo "Coverage generated"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 3

  # Publish Code Analysis
  publish-code-analysis:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage

      - name: Compute project version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [ -z "$TAG" ]; then
            SONAR_VERSION="v1.0.0"
          else
            SONAR_VERSION=$TAG
          fi

          echo "SONAR_VERSION=$SONAR_VERSION" >> $GITHUB_ENV

      - name: Publish Code Analysis
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectVersion=${{ env.SONAR_VERSION }}
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }}
